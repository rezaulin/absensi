<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — e-Pesantren</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','sans-serif']}}}}</script>
  <style>
    [x-cloak]{display:none!important}
    .login-gradient{background:linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#0f172a 100%)}
    .glass{background:rgba(255,255,255,0.05);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1)}
  </style>
</head>
<body class="font-sans antialiased login-gradient min-h-screen flex items-center justify-center p-4 relative overflow-hidden" x-data="loginApp()">
  <!-- BG effects -->
  <div class="absolute inset-0 opacity-20 pointer-events-none">
    <div class="absolute top-20 left-10 w-72 h-72 bg-green-500 rounded-full filter blur-[120px]"></div>
    <div class="absolute bottom-20 right-10 w-72 h-72 bg-blue-500 rounded-full filter blur-[120px]"></div>
  </div>

  <div class="w-full max-w-md relative z-10">
    <!-- Logo -->
    <div class="text-center mb-8">
      <a href="/" class="inline-flex items-center gap-2">
        <div class="w-10 h-10 bg-gradient-to-br from-green-400 to-blue-500 rounded-xl flex items-center justify-center font-bold text-lg text-white">eP</div>
        <span class="text-2xl font-bold text-white">e-Pesantren</span>
      </a>
      <p class="text-slate-400 text-sm mt-2" x-text="tenantName || 'Platform Absensi Pesantren'"></p>
    </div>

    <!-- Login Card -->
    <div class="glass rounded-2xl p-8">
      <!-- Tabs -->
      <div class="flex gap-1 mb-8 bg-slate-800/50 rounded-xl p-1">
        <button @click="tab='admin'" :class="tab==='admin' ? 'bg-gradient-to-r from-green-500 to-blue-500 text-white shadow-lg' : 'text-slate-400 hover:text-white'" class="flex-1 py-2.5 rounded-lg text-sm font-medium transition-all">Admin/Ustadz</button>
        <button @click="tab='wali'" :class="tab==='wali' ? 'bg-gradient-to-r from-green-500 to-blue-500 text-white shadow-lg' : 'text-slate-400 hover:text-white'" class="flex-1 py-2.5 rounded-lg text-sm font-medium transition-all">Wali Santri</button>
        <button @click="tab='super'" :class="tab==='super' ? 'bg-gradient-to-r from-green-500 to-blue-500 text-white shadow-lg' : 'text-slate-400 hover:text-white'" class="flex-1 py-2.5 rounded-lg text-sm font-medium transition-all">Super Admin</button>
      </div>

      <!-- Admin/Ustadz Form -->
      <form x-show="tab==='admin'" @submit.prevent="loginAdmin()" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1.5">Username</label>
          <input type="text" x-model="username" required placeholder="Masukkan username" class="w-full px-4 py-3 bg-slate-900/50 border border-slate-600 rounded-xl text-white placeholder-slate-500 focus:border-green-500 focus:ring-1 focus:ring-green-500 outline-none transition">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1.5">Password</label>
          <div class="relative">
            <input :type="showPass ? 'text' : 'password'" x-model="password" required placeholder="Masukkan password" class="w-full px-4 py-3 bg-slate-900/50 border border-slate-600 rounded-xl text-white placeholder-slate-500 focus:border-green-500 focus:ring-1 focus:ring-green-500 outline-none transition pr-12">
            <button type="button" @click="showPass=!showPass" class="absolute right-3 top-3 text-slate-400 hover:text-white">
              <svg x-show="!showPass" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
              <svg x-show="showPass" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.542 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>
            </button>
          </div>
        </div>
        <div x-show="error" class="text-sm p-3 rounded-lg bg-red-500/20 text-red-300" x-text="error"></div>
        <button type="submit" :disabled="loading" class="w-full py-3.5 bg-gradient-to-r from-green-500 to-blue-500 rounded-xl font-semibold hover:shadow-lg hover:shadow-green-500/30 transition-all disabled:opacity-50">
          <span x-show="!loading">Login</span>
          <span x-show="loading">Memproses...</span>
        </button>
      </form>

      <!-- Wali Form -->
      <form x-show="tab==='wali'" @submit.prevent="loginWali()" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1.5">NIS atau Nama Santri</label>
          <input type="text" x-model="identitas" required placeholder="Masukkan NIS atau nama lengkap santri" class="w-full px-4 py-3 bg-slate-900/50 border border-slate-600 rounded-xl text-white placeholder-slate-500 focus:border-green-500 focus:ring-1 focus:ring-green-500 outline-none transition">
        </div>
        <div x-show="error" class="text-sm p-3 rounded-lg bg-red-500/20 text-red-300" x-text="error"></div>
        <button type="submit" :disabled="loading" class="w-full py-3.5 bg-gradient-to-r from-green-500 to-blue-500 rounded-xl font-semibold hover:shadow-lg hover:shadow-green-500/30 transition-all disabled:opacity-50">
          <span x-show="!loading">Masuk sebagai Wali</span>
          <span x-show="loading">Memproses...</span>
        </button>
      </form>

      <!-- Super Admin Form -->
      <form x-show="tab==='super'" @submit.prevent="loginSuper()" class="space-y-5">
        <div class="p-3 rounded-lg bg-yellow-500/10 border border-yellow-500/30 text-yellow-300 text-sm mb-4">
          ⚠️ Halaman ini khusus untuk Super Admin platform
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1.5">Username</label>
          <input type="text" x-model="username" required placeholder="Super admin username" class="w-full px-4 py-3 bg-slate-900/50 border border-slate-600 rounded-xl text-white placeholder-slate-500 focus:border-green-500 focus:ring-1 focus:ring-green-500 outline-none transition">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1.5">Password</label>
          <input type="password" x-model="password" required placeholder="Super admin password" class="w-full px-4 py-3 bg-slate-900/50 border border-slate-600 rounded-xl text-white placeholder-slate-500 focus:border-green-500 focus:ring-1 focus:ring-green-500 outline-none transition">
        </div>
        <div x-show="error" class="text-sm p-3 rounded-lg bg-red-500/20 text-red-300" x-text="error"></div>
        <button type="submit" :disabled="loading" class="w-full py-3.5 bg-gradient-to-r from-yellow-500 to-orange-500 rounded-xl font-semibold hover:shadow-lg transition-all disabled:opacity-50">
          <span x-show="!loading">Login Super Admin</span>
          <span x-show="loading">Memproses...</span>
        </button>
      </form>
    </div>

    <p class="text-center text-sm text-slate-500 mt-6">
      Belum punya akun? <a href="/#daftar" class="text-green-400 hover:text-green-300">Daftar pesantren baru</a>
    </p>
  </div>

  <script>
  function loginApp() {
    return {
      tab: 'admin',
      username: '', password: '', identitas: '',
      error: '', loading: false, showPass: false,
      tenantName: '',
      init() {
        // Load tenant info if on subdomain
        const slug = this.getSlug();
        if (slug) {
          fetch('/api/tenant-info', { headers: { 'X-Tenant-Slug': slug } })
            .then(r => r.json())
            .then(d => { if (d.nama) this.tenantName = d.nama; })
            .catch(() => {});
        }
      },
      getSlug() {
        const host = window.location.hostname;
        const parts = host.split('.');
        if (parts.length >= 3) return parts[0];
        const params = new URLSearchParams(window.location.search);
        return params.get('slug') || '';
      },
      getHeaders() {
        const h = { 'Content-Type': 'application/json' };
        const slug = this.getSlug();
        if (slug) h['X-Tenant-Slug'] = slug;
        return h;
      },
      async loginAdmin() {
        this.error = ''; this.loading = true;
        try {
          const res = await fetch('/api/login', {
            method: 'POST', headers: this.getHeaders(),
            body: JSON.stringify({ username: this.username, password: this.password })
          });
          const data = await res.json();
          if (data.token) {
            localStorage.setItem('token', data.token);
            localStorage.setItem('user', JSON.stringify(data.user));
            window.location.href = '/app.html';
          } else { this.error = data.error || 'Login gagal'; }
        } catch (e) { this.error = 'Terjadi kesalahan koneksi'; }
        this.loading = false;
      },
      async loginWali() {
        this.error = ''; this.loading = true;
        try {
          const res = await fetch('/api/login-wali', {
            method: 'POST', headers: this.getHeaders(),
            body: JSON.stringify({ identitas: this.identitas })
          });
          const data = await res.json();
          if (data.token) {
            localStorage.setItem('token', data.token);
            localStorage.setItem('user', JSON.stringify(data.user));
            window.location.href = '/app.html';
          } else { this.error = data.error || 'Login gagal'; }
        } catch (e) { this.error = 'Terjadi kesalahan koneksi'; }
        this.loading = false;
      },
      async loginSuper() {
        this.error = ''; this.loading = true;
        try {
          const res = await fetch('/api/super/login', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: this.username, password: this.password })
          });
          const data = await res.json();
          if (data.token) {
            localStorage.setItem('token', data.token);
            localStorage.setItem('user', JSON.stringify(data.user));
            window.location.href = '/app.html';
          } else { this.error = data.error || 'Login gagal'; }
        } catch (e) { this.error = 'Terjadi kesalahan koneksi'; }
        this.loading = false;
      }
    };
  }
  </script>
</body>
</html>
